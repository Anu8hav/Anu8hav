<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <!-- Glow effect -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feGaussianBlur stdDeviation="15" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    text {
      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive, sans-serif;
      font-size: 130px;
      font-style: italic;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .neon-tube {
      fill: none;
      stroke: #ff0055;
      stroke-width: 10px;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#neon-glow);
      animation: flicker 4s infinite alternate;
    }
    .neon-core {
      fill: none;
      stroke: #ffffff;
      stroke-width: 4px;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: flicker 4s infinite alternate;
    }
    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% {
        opacity: 1;
      }
      20%, 24%, 55% {
        opacity: 0.1;
      }
    }
  </style>
  
  <!-- Shadow/reflection on the "wall" -->
  <text x="50%" y="55%" fill="#ff0055" opacity="0.1" filter="blur(15px)" font-family="'Brush Script MT', cursive">Anu8hav</text>
  
  <text x="50%" y="50%" class="neon-tube">Anu8hav</text>
  <text x="50%" y="50%" class="neon-core">Anu8hav</text>
</svg>
