<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <!-- Glow effect -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur1" />
      <feGaussianBlur stdDeviation="5" result="blur2" />
      <feGaussianBlur stdDeviation="12" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    text {
      /* Uses JetBrains Mono if installed, falls back to other clean monospaced fonts */
      font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 110px;
      font-weight: 200; /* Thin lines like the reference image */
      letter-spacing: 12px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .neon-tube {
      fill: none;
      stroke: #ffaa00; /* Gold */
      stroke-width: 5px;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#neon-glow);
      animation: flicker 4s infinite alternate;
    }
    .neon-core {
      fill: none;
      stroke: #fff9e6; /* Slight yellow-white core */
      stroke-width: 1.5px;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: flicker 4s infinite alternate;
    }
    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% {
        opacity: 1;
      }
      20%, 24%, 55% {
        opacity: 0.2;
      }
    }
  </style>
  
  <text x="50%" y="55%" fill="#ffaa00" opacity="0.1" filter="blur(10px)">Anu8hav</text>
  
  <text x="50%" y="50%" class="neon-tube">Anu8hav</text>
  <text x="50%" y="50%" class="neon-core">Anu8hav</text>
</svg>
